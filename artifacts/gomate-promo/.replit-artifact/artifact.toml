kind = "video"
  previewPath = "/gomate-promo/"
  title = "GoMate Promo Video"
  version = "1.0.0"
  id = "artifacts/gomate-promo"
  router = "path"

  [[integratedSkills]]
  name = "video-js"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/gomate-promo/" ]
  localPort = 24558

  [services.development]
  run = "pnpm --filter @workspace/gomate-promo run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/gomate-promo", "run", "build" ]
  publicDir = "artifacts/gomate-promo/dist/public"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "24558"
  BASE_PATH = "/gomate-promo/"
  